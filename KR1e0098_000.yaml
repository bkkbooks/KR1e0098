body:
  text: 春秋四傳糾正春秋類提要臣等謹按春秋四傳糾正一卷國朝俞汝言撰康熙丙辰汝言春秋平義始脫藁是嵗之夏復續作此書以綜括大旨相傳其晚年失明口授而成之者也書中摘列春秋三傳及胡安國傳之失隨事辨正區為六類一曰尊聖而忘其僭計八條二曰執理而近于迂計十五條三曰尚異而鄰于鑿計二十三條四曰億測而近于誣計四十三條五曰稱美而失實情計八條六曰摘瑕而傷鍥刻計六條末附春王正月辨一篇申左氏公羊孔安國鄭元之説明周正改時改月春秋正朔皆從周其中如華督奪孔父之妻齊桓因蔡姬而侵蔡史家簡䇿相傳必有所據即就傳文而論亦無以斷其必不然汝言皆以為億測近誣轉未免自蹈億側又公羊褒齊襄之復讐固為謬戾然紀侯譖齊哀公于周至于見烹則實有其事汝言乃謂語言之故不足為讐亦不甚可解至春王正月辨中謂左傳王周正月句王周二字猶漢稱皇漢宋稱皇宋之義則不知正月正嵗並見周禮兼用夏正實亦王制故特言王周正月明非夏時無庸牽引漢宋橫生曲説又一行衛朴推驗春秋日食皆合于建寅一條汝言無以難之遂泛謂不足深據不知日月交食推朔望不推時令建子建寅食限無殊一語可明亦不必顢頇其説如斯之類雖或問有小疵然六類之中大抵皆立義正大持論簡明一卷之書篇帙無幾而言言皆治春秋之藥石亦可謂深得經意者矣乾隆四十二年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋四傳糾正原序六經之不明諸儒亂之也自王輔嗣以老莊言易而六經有道家矣鄭康成以讖緯言禮而六經有數術家矣公穀胡氏以名稱褒貶言春秋而六經有名家法家矣彼其初未始不欲探聖人之精藴而智識弇淺強求深逺習見郡國之府寺而以為宫闕之巍峩不過如是不知輔相之道而以行師折獄之才智經邦國也淺求之而爽其度深求之而愈失其大體逮至有宋大儒程朱輩出而後正其紕謬易傳本義成而輔嗣卷舌儀禮經傳通解定而康成束手退矣若夫春秋左氏親見聖人公榖傳諸髙第弟子而偏駁者半焉康侯品髙學博文章能暢所欲言方以為程氏之正傳而疵類不少新安朱子心知之而不敢端言其過其説時時見於弟子講論之餘而後人又不能推明其義徒使附會穿鑿刑名法術之言出於一代大儒而不覺是可異也汝言不揣纂集諸家自為一書先之以四傳糾正為六端以該之一曰尊聖而忘其僭二曰執理而近於迂三曰尚異而鄰於鑿四曰億測而涉於誣五曰稱美而失情實六曰摘瑕而傷鍥刻六者之弊去而後可以讀春秋矣顧愚陋荒落何敢效針石於前賢聊以志願學之自略見其大指而已丙辰仲夏下弦漸川諸生俞汝言識
