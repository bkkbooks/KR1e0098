body:
  text: 春秋四傳糾正秀水俞汝言撰一曰尊聖而忘其僭隱公元年春王正月胡安國傳曰春秋立文兼述作舜典紀元日商訓稱元祀此經書元年所謂祖二帝明三王述而不作者也正次王王次春乃立法創制裁自聖心無所述於人者又曰周人以建子為嵗首前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣仲尼以夏時冠周月垂法後世按春王正月周制則然非自仲尼始作匹夫無位而可以改正朔乎欲以正天下而自干僭上之罪乎隱公三年宋公和卒胡氏曰諸侯曰薨大夫曰卒五等諸侯何以書卒周室東遷諸侯放恣聖人奉天討以正王法因其告喪特書曰卒不與其為諸侯也桓公二年滕子來朝胡氏曰滕侯爵降而稱子者桓弟弒兄臣弒君天下之大惡已不能討又先鄰國而朝之故降而稱子以正其罪七年穀伯綏來朝鄧侯吾離來朝胡氏曰桓天下之大惡也穀伯鄧侯相繼而來朝即大惡之黨也故特貶而書名僖公二十有三年杞子卒左氏曰杞成公卒書曰子杞夷也杜預以謂杞實稱伯而書曰子者成公始行夷禮終其身故仲尼於其卒以文貶之按黜陟諸侯天子之事周衰天子建空名於上未聞黜一小國滕薛之稱侯稱伯稱子是自貶損以便職貢非時王所貶仲尼亦因其自稱而書之而曰朝桓而貶且名因告喪而不與其為諸侯因用夷禮而以文貶之是天子仲尼也不過因孟子春秋天子之事一語誤之孟子謂所書者天子之事而不謂所行者天子之事也安得執詞以害義使仲尼為僭分越禮之首耶文公五年王使榮叔歸含且賵王使召伯來會葬胡氏曰不稱天王者弗克若天也成風以妾僭嫡王使大夫歸含且賵又使召伯來㑹葬則王法廢人倫亂矣故不稱天以謹之按使命得失直書於䇿而自見何待削天王之號且天王而可削春秋可不作矣趙鵬飛曰闕文近之二曰執理而近於迂隱公四年衛人立晉左氏曰衛人立晉衆也公羊曰立者何不宜立也其稱人何也衆立之之辭也衆雖欲立之其立之非也榖梁曰立者不宜立也賢則其不宜立何也春秋之義諸侯與正而不與賢也胡氏曰晉雖諸侯之子內不承國於先君上不禀命於天子故春秋於衛人特書曰立所以著擅置其君之罪於晉絶其公子所以明專有其國之非按州吁弒立踰年天討不加石碏大義滅親殺諸濮而立晉天下共多其能討叛而反正故書曰衛人立晉而公穀特發不宜立之詞而曰賢而不正然則孰為正乎文定因之有不承國於先君不稟命於天子而罪衛人以擅置其君罪晉以專有其國先君弒矣何所承命四國黨州吁天子置而不問稟命而立安知不更有方命如後之放黔牟者乎以是知成人之美不易得於君子也東山趙汸曰以不稱公子為惡王子朝豈宜立者乎莊公十年齊師宋師次於郎公敗宋師於乘丘左傳公子偃曰可敗也公弗許自雩門竊出䝉臯比而先犯之公從之大敗宋師於乘丘齊師乃還胡氏曰齊宋輕舉大衆誠有罪也魯人若能不用詐謀奉其辭令二國去矣偷得一時之捷而積四鄰之忿交譏之僖公元年季友敗莒師於酈獲莒拏公羊曰其言獲何也惡公子之紿胡氏曰抑鋒止鋭喻以辭命使知不縮而引去則善矣今至於兵刃既接又用詐謀擒其主將故以季友為主而書敗獲責之備也文公十有二年晉人秦人戰於河曲胡氏曰前年秦師來伐晉晉已服矣故狄秦而免晉今又為此役故不以晉為主惟動大衆不奉辭令以止之也故貶而稱人按辭命退師必因展喜犒師受命展禽齊師引退之事而為此言然安有不修兵甲而專恃辭命之理一之為幸其可再乎又謂莒師使知不縮而引去設不引去又將何施河曲亦然俱屬迂論也莊公十有三年齊侯宋人陳人蔡人邾人㑹於北杏榖梁曰是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也曰可矣乎未也舉人衆之辭胡氏曰春秋之世以諸侯而主天下㑹盟之政自北杏始桓非受命之君諸侯自相推戴以為盟主是無君也故四國稱人以誅始亂正王法也齊侯稱爵其與之乎誅諸侯者正也與桓公者權也或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也僖公十有九年宋公曹人邾人盟於曹南二十有七年楚人陳侯蔡侯鄭伯許男圍宋二十有八年晉侯齊師宋師秦師及楚人戰於城濮按齊侯稱爵四國稱人豫之為盟主也穀梁以桓非受命之伯疑之曰可矣乎未也有衆欲推戴之意猶可也而胡氏以諸侯為無君四國稱人為誅始亂不已傎乎北杏之後惟宋襄曹南之㑹晉文城濮之戰書法同至楚成圍宋楚稱人陳蔡鄭許稱爵與此全反然後知北杏之㑹豫桓為盟主也莊公十有八年公追戎於濟西公羊曰其言追何大其為中國追也其言於濟西何大之也榖梁曰於濟西者大之也何大焉為公之追之也胡氏曰書追者是不覺其來已去而追之也僖公元年夫人氏之喪至自齊左氏曰君子以齊人殺哀姜也為己甚矣女子從人者也昭公五年舍中軍公羊曰舍中軍何復古也穀梁曰貴復正也按濟西之追殊無足異公羊以追戎二字為美大其為中國之追已屬賖緩齊桓殺哀姜千古快事而左氏譏其己甚羅喻義曰左氏之所謂從人竟從誰也至作中軍三分公室而各有其一及其舍之四分公室季氏擇二二子各一皆盡征之而貢於公然則作與舍皆季氏公室徒虛名耳他日公臣三耦不備取諸家臣禘於襄公萬者二人其衆萬於季氏公穀不考事實而曰復古復正豈真舍三軍而復二軍之舊乎迂亦甚矣僖公四年蔡潰遂伐楚胡氏曰楚雖暴橫憑凌上國齊不請命擅合諸侯書遂伐楚譏其專也按楚自敗蔡伐鄭以來强暴滋甚齊桓圖霸二十年遠結江黃近控七國始為侵蔡伐楚之師不綦重哉而以不請命天王譏其專伐豈蔡潰之後束甲而旋乎吾知非真惡桓而云然不過以當時諸侯知有霸主而不知有天子特借書法以明大義耳然何以處桓也成公二年取汶陽田胡氏曰汶陽之田本魯田也不曰復而謂之取何也得其故壤而不請命於天王以正疆理則取之不以其道與得非其有奚異乎按汶陽雖魯田而以充鞍之進同於取非其有不為過也而曰不請天王以正疆理亦儒者尊王之恆辭而未暇審當時之勢所謂近於迂濶者也三曰尚異而鄰於鑿隱公元年春王正月以後至十有一年俱不書正月公羊曰隱何以無正月隱將讓於桓故不有其正月也榖梁曰隱十年無正月不自正也元年有正所以正隱也定公元年春王三月晉人執宋仲幾於京師公羊曰定無正月者即位後也榖梁曰不言正月定無正也定之無正何也昭公之終非正終也定公之始非正始也按二傳之論甚精然史䇿之舊實不關聖心也元年正月書即位仲尼削之以見隱之志以後記事或以春或以二月三月者隨事而書無庸心也當與桓無王並非有意削去定公六月即位事在三月故書春王三月邵文莊高文憲論之甚晰可無容贅至隱不爵大夫桓無會秦楚吳莒無大夫皆榖梁氏之說均可置而弗論也隱公二年紀子帛莒子盟於密杜注子帛裂繻字桓公二年及其大夫孔父左氏曰孔父嘉為司馬榖梁曰孔氏父字也左氏曰父名也五年州公如曹六年春實來榖梁曰實來者是來也公羊曰猶是人來也杜注實州公名也胡傳因之按名之與字非可以意而為之子帛為裂繻字似矣而大夫居國君上春秋無是法也則字亦非確也孔父名嘉見諸傳者甚明文定以為名父蓋以君名於上不應臣字於下義固然矣而父之為名終有未安海昌朱朝瑛曰父與甫通孔父字嘉猶杜甫之字美也或其然與至曰為祖諱益非州公名實始於元凱三傳絶無其文亦以例名失地之君而撰名以就例也桓公元年春王正月公即位二年春王正月宋督弒其君與夷十年春王正月十有八年春王正月公㑹齊侯於濼此外俱春正月或春二月榖梁曰桓無王元年有王所以治桓也二年正與夷之卒也十年正終生之卒也胡氏曰不書王者見桓公無王與天王之失政而不王也桓公至是宜見誅於天矣十年書王紀常理也十八年復書王者明弒君之賊雖身亦沒而王法不得赦也按傳聞之世殘缺已多仲尼能削其所不當書不能增其所不備且欲明桓公之弒於元年即位一書已見其志矣何待十四年之不書王哉桓公三年冬有年宣公十有六年冬大有年程氏曰記異也胡氏曰十二公多歷年所豈無豐年而不見於經獨桓有年宣大有年存而不削者緣此二公獲罪於天宜得水旱凶災之譴今乃有年則是反常也故以為異而獨存焉按此論因二君而發不為過當但百姓何罪焉既無仁愛之君而又值歉收之嵗則靡有孑遺矣黃震曰春秋豈專記人之凶喪而不幸人之豐熟哉各書其實爾桓公四年七年闕秋冬二時杜預曰不書秋冬史闕文胡氏曰古者刑以秋冬桓弟弒兄臣弒君而天討不加焉天下之望絶矣故四年宰糾書名而去秋冬二時以見天王之不復能用刑也方伯連帥環視而莫之恤猶有望也及榖鄧二國自逺來朝則天下諸侯莫有可望者矣故七年榖伯鄧侯各書其名而去秋冬二時以見諸侯之不復能修其職也十四年有夏五無月十七年五月無夏僖二十八年冬無月而有壬申丁丑昭十年十二月無冬定十四年闕冬一時按以事繫日以日繫月以月繫時史法也雖無事必具四時春秋法也今二年去秋冬二時設此時有征伐㑹盟之不可不書者豈以欲去二時之故而置不書乎傳聞之世逺矣殘闕之文不啻一端杜說為是果其去也不但黜王且黜天矣其可哉夏五以下諸闕文皆史䇿之舊孔子因之或後人之脫漏不可强為說也莊公二十有四年大夫宗婦覿用幣胡氏曰公事曰見私事曰覿見夫人禮也曷為以私言之夫人不可見乎宗廟則不可以臨羣臣故以私言之也按覿常稱不以哀姜故而特名之其失在男女同贄用幣之非禮而豈以覿之名乎且夫人不可以見宗廟臨羣臣論亦過深襄公七年公㑹晉侯宋公陳侯衛侯曹伯莒子邾子於鄬鄭伯髠頑如㑹未見諸侯卒于鄵左氏曰以瘧疾赴也公羊曰為中國諱也不使夷狄之民加乎中國之君也胡氏曰僖公欲從諸侯㑹于鄬則是為中國之君也諸大夫欲背中夏與荆楚則是為夷狄之民矣以中國之君而見弒于夷狄之民聖人傷之甚懼之甚故變文而書曰鄭伯髠頑如會未見諸侯丙戌卒于鄵按弒而僞赴又為之隱諱春秋豈傳信之書乎乃曰不使夷狄之民加乎中國之君其言雖美而欲以懲戒弒逆亦己遼緩究之僖未嘗弒臣亦未嘗從楚也襄公三十年葬蔡景公公羊曰賊未討何以書葬君子辭也榖梁曰不忍使父失民于子也晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹於澶淵宋災故左氏曰諸侯之大夫會以謀歸宋財既而無歸於宋故不書其人不言魯大夫諱之也胡氏曰春秋大法君弒賊不討則不書葬而蔡景公特書葬者遍刺天下之諸侯也以下文書㑹於澶淵宋災故而貶其大夫則知之矣㑹未有言其所為者此獨言其所為遍刺天下之大夫也蔡世子般弒其君則㑹其葬而不討宋災小事也則合十三國之大夫而歸其財則可謂知務乎是故諸侯之大夫貶而稱人魯卿諱而不書按救災恤鄰為國之大務然何至合十三國之大夫而謀之既又不歸於宋不信更不可為也胡氏之論甚正若能以恤災之舉為討罪之師晉可以繼文襄而復振矣惜乎其不能也特非筆削之本㫖故未敢以為確論至弒父何事公榖曰君子辭曰不忍使父失民於子何異揖讓而救㷊溺乎昭公元年楚子麋卒左氏曰公子圍將聘於鄭未出竟聞王有疾而還已酉公子圍至入問王疾縊而殺之胡氏曰郟敖實弒而書卒何歟圍弒君以立四國莫能討則亦已矣至大合諸侯於申若革其僞赴而書以弒君恐天下以篡弒之賊可從之以主㑹盟聖人懼之甚故略其篡弒以扶中國按楚圍設服離衛列國大夫皆知其有大志合之椒舉慶封之言為弒信矣然亦因其平日不臣之跡與廢郟敖之子自立而疑之實非弒也春秋書其實耳若曰為申之㑹諱其論甚曲而深恐非聖人之本㫖也昭公二十年盜殺衛侯之兄縶胡氏曰左氏以為齊豹殺之也齊豹為衛司冦守嗣大夫其書為盜所謂求名而不得者也若艱難其身以險危大人而有名章徹攻難之士將奔走之臣竊以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乘也於法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖人又靳此名而不與者哉然則齊豹首謀作亂宗魯雖與聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗乎曰豹之不義大夫皆知之也若宗魯欲事豹而死於公孟蓋未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉非聖人發其食姦受亂蓋不義犯非禮之罪書於春秋則齊豹所畜飬之盜孟縶所見殺之賊其大惡隱矣按左氏求名不得之論甚為駭聽文定辨之是矣至以盜歸宗魯宗魯有食姦受亂蓋不義犯非禮之罪謂之不知大義可也而以殺公孟之盜實之恐不能舍齊豹而為之代罪也四曰億測而涉於誣隱公元年公及邾儀父盟於蔑公羊曰曷為稱字褒之也曷為褒之為其與公盟也二年紀履繻來逆女榖梁曰以國氏者為其來交接于我故君子進之也桓公二年宋督弒其君與夷及其大夫孔父榖梁曰孔父不稱名蓋為祖諱孔子故宋也僖公二十有五年宋殺其大夫榖梁曰其不稱名姓以其在祖之位尊之也定公十年齊人來歸鄆歡龜隂田胡氏曰夫子以禮責齊而齊人歸地皆書曰來序績也自序其績可乎聖人㑹人物于一身通古今于一息是以天自處矣而亦何嫌之有按聖人無私儀父與公盟而書字履繻來交接于我而以國氏謂之無私得乎且履繻而不以國氏若何稱之孔父之為其祖不名宋殺其大夫不稱名以在祖之位尊之尤謬春秋豈孔子之家牒乎歸田常事來歸常辭名曰序績恐仲尼不居以無私乃私也隱公二年夫人子氏薨公羊曰隱公之母也榖梁曰隱之妻也卒而不言葬夫人之義從君者也胡氏同三年君氏卒公榖作尹氏左氏曰聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為君故曰君氏公羊曰尹氏者何天子之大夫也其稱尹氏何貶譏世卿也外大夫不卒天王崩諸侯主之也榖梁胡氏同僖公八年禘于太廟用致夫人左氏曰禘而致哀姜焉非禮也公羊曰夫人何以不稱姜氏貶譏以妾為妻也蓋脅于齊媵女之先至者也榖梁曰言夫人而不以氏姓非夫人也立妾之辭也非正也胡氏曰夫人者風氏也按議禮之家古稱聚訟春秋記事之書也而亦然何也隱母隱妻均無確據而以不言葬為夫人之義從君則隱妻庶幾近之然後云考仲子之宫則知夫人為仲子也隱代桓立故以桓母為夫人無疑矣君氏左氏明言隱母蘇穎濱曰哀公之母曰姒氏卒哀未君也隱既君矣不稱子氏而稱君氏著其君也公榖以尹氏為天子大夫天王崩為魯主故卒之然則王子虎劉卷皆稱名而此不名豈卒者為尹氏一族乎趙子常之言可思也又曰譏世卿更為無謂魯史之文而譏及天子世卿有是書法乎僖公之致夫人哀姜固非成風亦未必然黃道周曰聲姜也致之又明年公與夫人姜氏會齊侯于陽榖則是聲姜公榖之所謂以妾為夫人也隱公三年紀子伯莒子盟于密榖梁曰紀子伯莒子而與之盟莊公二十有四年曹羈出奔陳赤歸于曹郭公公羊曰曹無赤者蓋郭公也榖梁曰赤蓋郭公也胡氏曰或以為郭亡閔公元年齊仲孫來左氏曰齊仲湫來省難公羊曰齊仲孫者何公子慶父也僖公五年晉人執虞公胡傳其稱公者非存其爵猶下執之之辭也十有五年已卯晦震夷伯之廟公羊榖梁皆曰晦冥也二十有八年晉侯入曹以曹伯畀宋人公羊曰曹伯之罪何甚惡也不可以一罪言也昭公十有二年齊髙偃帥師納北燕伯于陽公羊曰伯于陽者何公子陽生也二十有二年蔡侯朱出奔楚榖作東榖梁曰東者東國也曰東惡之而貶之也哀公十有三年晉魏曼多帥師侵衛公羊無曼字公羊曰曷為謂之晉魏多譏二名二名非禮也按釋經作傳言其所知闕其所不知寧有信臆妄言在事理之外者乎至赤蓋郭公虞公非爵齊仲孫即慶父伯于陽為公子陽生東國曰東而云貶曼多去曼而云譏尤屬不經桓公元年齊師遷紀郱鄑郚公羊曰遷之者何取之也取之則曷為不言取之也為襄公諱也四年紀侯大去其國公羊曰大去者何滅也曷為不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讐也九世猶為之復讐乎雖百世可也按齊襄荒淫不避同産載驅之詩譏焉殘虐無常侵陵紀國始遷三邑後卒滅之殄絶同姓而不惜至問其故則曰復讐夫語言之故不足為讐況九世之逺乎不過藉此為兼并之端而公羊愚儒信而賢之曰為襄公諱夫襄公而賢則衛宣陳靈皆當見録於春秋矣而曰為襄公諱襄公其賢于衛宣陳靈乎桓公二年宋督弒其君與夷及其大夫孔父左傳華督見孔父之妻于路目逆而送之曰美而艷三年殺孔父而取其妻僖公四年侵蔡蔡潰遂伐楚左傳齊侯與蔡姬乘舟蕩公禁之不可公怒歸之未之絶也蔡人嫁之春以諸侯之師侵蔡二十有八年晉侯侵曹晉侯伐衛及楚人戰于城濮左傳公子重耳過衛衛文公不禮焉及曹曹共公聞其駢脅欲觀其裸浴薄而觀之及楚楚子饗之曰何以報我曰以君之靈得反晉國晉楚治兵遇于中原其避君三舍按晉人謂左氏美而艷其失也誣信乎孔父正色立朝為邪逆所畏憚故先賊之而後行篡弒若以目送其妻而後動賊害之謀則孔父先失間有家之道矣謂忠貞何桓文霸業造端管趙之謀楚者計出萬全以為蔡先附楚曹衛即楚且結婚焉故召陵之師先侵蔡城濮之戰先事曹衛而曰懲蔡女蕩舟之釁治二國無禮之愆何其淺視桓文也主父偃息夫躬之為而謂倡霸者為之乎桓公六年子同生公羊曰喜有正也其諸以病桓與榖梁曰疑故志之時曰同乎人也按啖助曰君嫡子生以太子生之禮舉之則史書之而公榖有病桓同乎人之疑因公有同非吾子齊侯之子之語流傳人間也然聖人筆之于䇿何容戲論至戴溪謂春秋十二公惟莊公為嫡長是又不然子惡母出姜成公母穆姜皆嫡也哀公母定姒雖無逆女之文恐亦非妾媵且諡同定公嫡夫人無疑岷隱之言恐未核也莊公元年單伯送王姬公榖作逆十有四年單伯㑹伐宋單伯㑹齊侯宋公衛侯鄭伯于鄄文公十有四年單伯如齊齊人執單伯十有五年單伯至自齊公羊榖梁曰單伯者何吾之命大夫也命大夫故不名也按單伯天子之大夫也始來送王姬中㑹伐宋後如齊雖非一人皆承王命而來公榖以為吾命大夫因遂以送為逆王姬命吾為主故單伯過吾若逆則不必書矣齊桓倡霸魯未嘗與伐宋之役須公親在行間而以大夫往㑹不如公子結之啓釁乎商人弒君襄仲求王寵以單伯請昭姬為齊執而曰吾大夫文定從而信之後人以三見單伯于經疑為一人曰年過百已三娶矣更可笑莊公九年宋大水榖梁曰此何以書王者之後也僖公十有六年隕石於宋五是月六鷁退飛過宋都文公三年雨螽于宋襄公九年宋災公羊皆曰為王者之後紀異也按災異之書為一國記為天下記而公榖于宋則曰為王者之後然則陳為虞後把為夏後何皆闕如獨于宋而書之二傳之謬多端而公羊為甚于春王正月曰王者孰謂謂文王也誕罔若此其他又何問乎僖公十有四年季姬及鄫子遇于防使鄫子來朝十有五年季姬歸于鄫公羊榖梁曰來朝者來請己也胡氏曰季姬書字而未繫諸國其女而非婦明矣內女而外與諸侯遇譏魯也蓋魯公鍾愛其女使自擇配故得與鄫子遇于防而遂以季姬歸之爾按左氏曰鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝此實録也公榖曰使請已亦以公怒止之而令其來朝請已初無異指也文定求其說而不得因季姬之不繫于國後又有歸鄫之文設為鍾愛其女使自擇配之說臆度耳非有實據也不知季姬內女何自識鄫子而欲嫁之而又遇之于防而令其請已即匹庶之賤亦無此事而況女公子耶其誣罔甚矣僖公二十有四年天王出居于鄭胡氏曰自取之也故貶而書出襄公十有四年衛侯出奔齊胡氏曰不言孫林父寧殖出其君者所以警乎人君為後世鑒昭公二十有五年公孫于齊次于陽州胡氏曰奔出稱孫隱也按傳于君出皆歸過于君于鄭為自取奔齊為警君孫齊為不知消息盈虛之理原其故皆以自出自孫為文而不書逐君之臣不知聖人非以臣為無罪而釋之也頽叔桃子奉大叔執周公晉文亦止定王而不深討罪魯衛之事晉之君臣皆置君不問而臣是助既無伯討以自出為文隱之至也豈聖人得己乎至師曠史墨有歸過于君之語皆當時邪說但知大夫之强而不知有諸侯況天子乎後世不知而信之害世道不淺何傳者之夢夢也僖公二十有五年宋殺其大夫文公七年宋人殺其大夫公羊曰何以不名宋三世無大夫三世內娶也按三世內娶謂禮不臣妻之父母大夫在伯舅叔舅之列而不名乎夫名之不可而可殺之亦迂論矣且國君不臣伯叔昆弟謂始封之君也繼世無論矣況外氏乎邵寶曰以諸父則周公臣成王以諸兄則微子臣紂妻之父胡為其不可臣也文公十有四年單伯如齊齊人執單伯齊人執子叔姬十有五年單伯至自齊齊人來歸子叔姬公羊曰單伯之罪何道淫也惡乎淫淫乎子叔姬叔姬何罪榖梁曰單伯淫乎齊齊人執之齊人執子叔姬叔姬同罪也按子叔姬非他魯侯之女齊昭之夫人舍之母也公子商人弒舍魯以王寵求昭姬于齊故單伯如齊齊人執之又執子叔姬是商人蔑天王而戮君母也道淫之說必齊人誣之而執之爾髙赤信而筆之於傳厚誣王臣厚誣國母不有左氏何以正之昭公二十有二年王子猛卒公羊曰此未踰年之君也稱王子猛卒何不與當也不與當父死子繼兄死弟及之辭也哀公三年齊國夏衛石曼姑帥師圍戚公羊曰伯討也曼姑受命乎靈公而立輒以曼姑之義為固可以拒之也按君臣父子大倫不可少易景王太子夀卒母弟猛立父死子繼兄死弟及舍猛而誰不與當之言真不可解輒無靈公之命安得謂受之王父辭父命也胡氏謂主兵者衛而以齊為首罪齊人黨衛之惡其說甚正而至趙鞅納瞶則又曰人莫不愛其親而志于殺莫不敬其父而忘其喪莫不慈其子欲其富且貴也而奪其位蒯瞶之于天理逆矣此又矛盾之論也五曰稱美而失情實桓公十有一年宋人執祭仲公羊曰何以不名賢也何賢乎祭仲以為知權也胡氏曰何以不名命大夫也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責之也閔公二年公薨公羊曰慶父弒二君何以不誅緩追逸賊親親之道也按蔡仲不能執義守節因宋劫而立突又因雍糾之故突出忽歸鄭為之不靖者數世誰之過與而以知權賢之謬矣慶父身弒二君季友使之自縊而立後君子謂其罰不蔽辜乃以緩追逸賊親親之道褒之不亦甚乎以不誅慶父而曰親親則周公為失刑矣慶父之罪豈薄于管蔡哉莊公九年公伐齊納糾齊小白入于齊榖梁曰齊公孫無知弒襄公齊人殺無知而迎公子糾于魯公子小白不讓公子糾先入又殺之于魯故曰齊小白入于齊惡之也胡氏曰糾不書子者明糾不當立也以小白繫齊者明小白宜有齊也糾與小白皆庶子而糾弟也按糾與小白皆僖公子而兄弟之次亦未有明據漢人云桓公殺其弟以反國荀子又有齊桓殺兄之語所執者糾不書子而小白亦不書小白繫齊而糾䝉上伐齊之文不可云納齊糾且左氏已書納子糾矣徒以桓公得位而有霸功人多謂其當立榖梁氏之言庶可格佞也僖公九年宋公御說卒左傳宋桓公卒未葬而襄公會諸侯故曰子榖梁曰未葬而之㑹以宋子為無哀矣公羊曰何以不書葬為襄公諱也文公四年晉侯伐秦胡氏曰晉人三敗秦師穆公濟河焚舟則貶而稱人襄公又報之而得稱聖人以常情待晉襄而以王事責秦穆所以異乎秦穆至是見伐而不報不譏晉侯所以深善秦伯宣公十有一年楚子入陳納公孫寧儀行父于陳左氏曰書有禮也按諸傳于五霸必飾其美而沒其惡如小白入齊言其以國氏糾不稱子之類宋桓未葬而襄㑹諸侯在他人必多方指摘加以不孝之罪而反以不書葬為之諱以視晉襄墨縗受譏忘親不大懸乎秦穆伐喪兵連不解至于濟河焚舟取王官封殽尸而晉亦圍䢵新城春秋秦稱人晉稱爵明有所軒輊也而文定巧為掩護乃曰以王事待秦穆非以其霸之故乎至楚莊入陳名為討賊而實利其土田故有蹊田奪牛之喻又為之納不令之臣為楚莊者殺徴舒之後立嗣君表泄冶之墓戮公孫寧儀行父于朝雖桓文不能與之比烈矣而反納亂人討亂者如是乎左氏謂之有禮不知禮何在也邵雍曰先定五霸之功罪寧可不辨是非而概録之乎僖公二十有二年宋公及楚人戰于泓宋師敗績左傳宋人既成列楚人未既濟司馬請擊之不可既濟而未成列又以告未可既濟而後擊之宋襄敗績公傷股國人皆咎公公曰君子不重傷不禽二毛寡人雖亡國之餘不鼓不成列公羊曰大其不鼓不成列臨大事而不忘大禮以為雖文王之戰亦不過此也按宋襄志大才疏求為盟主一會而虐二國之君何有于重傷與禽二毛南曹之盟口血未乾而圍曹何有于不鼓不成列而公羊氏大之以為文王之戰不是過亦太甚矣其譽之也戰甗納昭義戰也而榖梁氏惡之胡氏以奉少奪長曲之泓之敗反得意外之褒夫抑之至不得比于豎刁易牙揚之至埓于文王儒者之論若是其甚乎至二十七年楚人合四國圍宋稱人貶為執宋公故終僖之篇貶公羊之念宋襄雖沒世而不衰如是其圍宋反不論也宣公十有八年公孫歸父如晉歸父還自晉至笙遂奔齊左傳曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏子家還及笙壇帷復命于介既復命袒括髮即位哭三踊而出遂奔齊書曰歸父還自晉善之也公羊曰還者善辭也榖梁曰自晉事畢也與人之子守其父之殯捐殯而奔其父之使者是亦奔父也胡氏曰歸父以君命出使未反而君薨今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉至笙遂奔齊者罪成公君臣死君而忘父逐之亟也按襄仲殺惡及視援立宣公宣公深德之歸父嗣父執政伐邾伐莒㑹齊㑹楚今又如晉而欲去三桓季文子所以亟逐之也其事雖出于季氏而襄仲弒逆之罪再世不宥即曰去三桓亦去異已而自擅國政耳安得以復命袒哭而反咎君臣之死君而忘父母乃録小禮而忘大惡乎諸傳于此失輕重之衡矣六曰摘瑕而傷鍥刻隱公元年鄭伯克假于鄢公羊曰克之者何殺之也殺之則曷為謂之克大鄭伯之惡也榖梁曰克者何能也何能也能殺也按左氏鄭伐京京叛太叔段段入于鄢公伐諸鄢太叔出奔共公孫滑出奔衛衛人為之伐鄭取廩延至十一年鄭入許莊公曰寡人有弟不能和協而使糊其口于四方則鄭莊未嘗殺弟也未嘗殺弟而曰殺之曰能殺不已甚乎左氏曰如二君故曰克此釋經之法也僖公五年晉侯殺其世子申生胡氏曰公羊子云殺世子母弟直稱君者甚之也申生進不能自明退不能違難愛父以姑息而陷之不義讒人得志幾至亡國先儒以為大仁之賊也按驪姬讒搆陷太子于大惡不辨不亡自縊新城可謂仁孝之至而以姑息愛父陷之不義為辭何其論之苛也然則欲免文定之譏者何施而可文公四年逆婦姜于齊榖梁傳曰婦有姑之辭也其不言氏何也貶之也何為貶之也夫人與有貶也胡氏曰婦人不專行何以與有貶父母與有罪也按二年冬如齊納幣以喪未終而圖婚譏之矣兹則服終已久以卿不行為非禮責文公是也而夫人與貶真所不解乃曰父母與有罪則亦何罪之可指乎襄公二十有九年吳子使札來聘公羊曰吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也榖梁曰吳其稱子何也善使延陵季子故進之也胡氏曰札者吳之公子何以不稱公子貶也辭國而生亂者札為之也故因其來聘而貶之按吳子使札與楚子使椒秦伯使術一也何獨于季札而貶之曰以辭國故辭國者有人矣公子魚公子臧皆以讓取貴于春秋何獨于札而責之且前此泰伯伯夷皆辭國也孤竹不知所終周之後代商有天下幸也不然泰伯伯夷不免與札同責也是說也本之公羊氏謂宋殤莊之禍宣公為之至是又獨以讓國賢札文定不信此之賢讓而信前此之兆禍非常情所可解也春王正月辨春秋書王正月左氏云春王周正月公羊氏云曷為先言王而後言正月王正月也榖梁氏云雖無事必舉正月謹始也不言王義後傳桓公八年正月己卯蒸云蒸冬事也春興之志不時也不言子月胡氏云以夏時冠月垂法後世以周正紀事示無其位不敢自專也然則左公羊主周正榖梁主夏時胡氏從周正而云夏時冠周月謂周人改時改月者孔安國鄭康成之說也其後朱晦菴吳仲遷陳定宇張敷言史伯璿吳淵穎汪克寬劉勿齊趙子常劉伯溫王濟之王伯安楊用修因之其義與左公羊符不改時但改月者程伊川之說也劉質夫因之其言與胡氏合不改時亦不改月者蔡九峯之說也黃東發周洪謨郎瑛盧璘葉秉敬因之其㫖與榖梁小異而實相助然則孰為定論哉俞子曰左氏公羊孔鄭之說正有難之者曰子從周正也惑于三統之說也黃唐虞夏商周皆建寅未嘗有建子建丑之事建子建丑後儒之附㑹也不可信應之曰商書咸有一德爰革夏正汲冢周書云亦越我周王致罰于商改正改械以垂三統何可誣也甘誓夏書已云怠棄三正不創自三代也難曰縱有之然所言正朔者特以是月為嵗首朝㑹聘問頒厯授時于是始焉耳不易時月也前乎商之建丑其書即位曰元祀十有二月月不改也後乎秦之建亥其書始建國曰元年冬十月時不改也且秦不置閏而為後九月蓋以十月為正朔故于當閏之嵗率歸餘于終是秦以亥月為正朔而以寅月為正月也應之曰是說也引經說史詳矣然如春秋之所書邪隱公九年三月大雨震電庚辰大雨雪隱公八年冬十一月雨雪僖公十年冬大雨雪桓公十四年春正月無氷成公元年二月無氷襄公二十八年春無氷定公元年冬十一月隕霜殺菽若從夏正何以為異而書之難曰此惑于公羊災異之說也春秋非怪之書震電無氷隕霜雨雪何足深異而必云災應之曰聖人書常常之可書者多何特書無氷電雪等哉且大雪在冬固不異與震電洊至亦不異耶莊公七年秋無麥苖麥苗為午月事而云秋豈亦夏時之秋耶難曰災異莫重于日食春秋日食三十六厯家推驗得二十六唐一行得二十七宋衛朴得三十五皆本建寅卜偃論滅虢九月十月之交所數日月星辰皆夏正為建寅之月愈信應之曰日食推驗始于向歆父子班固所述五行志固本周正矣一行衛朴所不計也皆本建寅無足深據滅虢之事在僖五年卜偃曰丙子旦日在尾月在䇿鶉火中必是時也冬十二月丙子滅虢若夏正之十二月則日不在尾矣難曰詩云七月流火正月繁霜十月之交六月徂暑周官正月始和中冬教閲享蒸吕覽月令昏旦中星皆與夏正合周厯從夏可知何獨春秋而違之應之曰豳風一之日二之日以子月起數十月蟋蟀下繼以曰為改嵗唐風蟋蟀在堂乃九月之候而曰嵗聿云暮明以子月為嵗首且周禮有正月有正嵗州長正月屬民讀法正嵗讀法如初言初則正月居先矣禮記孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖朱晦菴張敷言分史冊所書民俗所用二正並行升菴是之則詩禮之從夏正者民俗所用也難曰改嵗指頒朔而言與月令無涉唐武曌改周正以子月為正月丑月為臘月寅月為一月正月二字著于令不必著于厯建寅之月系春不系周建子之月系周不系春周實有二正月也應之曰以頒朔告朔為改嵗嵗已改矣朔已頒矣又何復有春正月也況即位匪細故魯十二公自隱閔僖定外皆書正月即位何悍然不奉正朔而行夏正哉復云蒸享仍行夏正何周禮仲冬蒸享冬至郊天二者之祭屢書之于春正月二月也武氏之制實為戾古周行二正其說誠然然云建寅之月系春不系周而左氏云王周正月何哉難曰左氏書王周正月句法不順恐非原文且歐陽修云不書王恐正朔之無所禀承列國之史皆然至周史則不稱王矣應之曰王周者猶漢曰皇漢宋曰皇宋也奚不順之有尊王之義豈惟歐陽董仲舒已言之矣若不禀正朔而尊王即歐陽亦未必為然也難曰建子建寅可改而立春立冬决不可改若改時亦改月冬十一月既作春正月則立冬當作立春節氣亂矣應之曰春夏之名安所始亦始于前人耳王鏊云建子之月一陽所始不可為春乎午未之月隂氣所始不可為秋乎冬夏亦然後漢陳寵云冬至陽氣始萌有蘭麝干藝荔挺出之應天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春寅月陽氣已至蟄蟲始振人以為正夏以為春獨非其正證耶且左傳僖公五年春王正月辛亥朔日南至南至為王正月則建子明矣難曰然則不主夏時矣夏時冠正月然與應之曰非也胡氏泥伊川假天時立義之說故巧立名以誣聖人然時則夏矣月則周矣下之所系從夏從周何所定也難曰是則周之改時改月也于何始之應之曰武王始之武王伐紂日在析木之津辰在斗柄朱朝瑛曰當時日南至日躔牽牛伐紂之舉尚在南至之前而武成稱一月伐商泰誓稱春㑹孟津則改時改月自武王始矣夫周時二正實兼行之頒之厯書之史行之朝者遵王制用之民者從夏時孔子曰行夏之時聖人所以教萬世也春秋而亦行夏時諸侯且與天王爭匹夫且與天子亢矣故曰左氏公羊孔鄭之說正春秋四傳糾正
